<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Comissões</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      background: #f4f6f9;
      color: #1f2937;
    }

    .app {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: linear-gradient(180deg, #00285C, #001b3f);
      color: white;
      padding: 24px 18px;
      position: fixed;
      height: 100vh;
    }

    .logo {
      font-size: 23px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .subtitulo {
      font-size: 12px;
      color: #cbd5e1;
      margin-bottom: 30px;
    }

    .menu button {
      width: 100%;
      padding: 14px;
      margin-bottom: 10px;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.12);
      color: white;
      font-size: 15px;
      cursor: pointer;
      text-align: left;
      font-weight: bold;
    }

    .menu button:hover,
    .menu button.ativo {
      background: white;
      color: #00285C;
    }

    .conteudo {
      margin-left: 260px;
      width: calc(100% - 260px);
      padding: 28px;
    }

    .topo {
      background: white;
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 22px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    }

    .topo h1 {
      margin: 0;
      color: #00285C;
      font-size: 24px;
    }

    .topo p {
      margin: 6px 0 0;
      color: #64748b;
      font-size: 14px;
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      margin-bottom: 22px;
    }

    .card h2 {
      margin-top: 0;
      color: #00285C;
      font-size: 21px;
    }

    label {
      display: block;
      margin-top: 14px;
      font-weight: bold;
      font-size: 14px;
      color: #334155;
    }

    input, select {
      width: 100%;
      padding: 13px;
      margin-top: 6px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
      background: white;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #00285C;
      box-shadow: 0 0 0 3px rgba(0,40,92,0.12);
    }

    .linha {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .status-box {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 6px;
    }

    .status-box button {
      padding: 13px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      background: white;
      cursor: pointer;
      font-weight: bold;
      color: #475569;
    }

    .status-box button.ativo {
      background: #16a34a;
      color: white;
      border-color: #16a34a;
    }

    .status-box button.inativo {
      background: #dc2626;
      color: white;
      border-color: #dc2626;
    }

    .acoes-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-top: 22px;
    }

    .btn-salvar {
      padding: 15px;
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-salvar:hover {
      background: #15803d;
    }

    .btn-cancelar {
      padding: 15px 20px;
      background: #64748b;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      cursor: pointer;
      font-weight: bold;
      display: none;
    }

    .btn-cancelar:hover {
      background: #475569;
    }

    .mensagem {
      margin-top: 15px;
      padding: 12px;
      border-radius: 8px;
      display: none;
      font-weight: bold;
      text-align: center;
    }

    .sucesso {
      display: block;
      background: #dcfce7;
      color: #166534;
    }

    .erro {
      display: block;
      background: #fee2e2;
      color: #991b1b;
    }

    .oculto {
      display: none;
    }

    .tabela-area {
      overflow-x: auto;
      margin-top: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
    }

    th {
      background: #00285C;
      color: white;
      text-align: left;
      padding: 12px;
      font-size: 13px;
    }

    td {
      padding: 11px;
      border-bottom: 1px solid #e5e7eb;
      font-size: 14px;
    }

    tr:hover td {
      background: #f8fafc;
    }

    .badge {
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    .badge-ativo {
      background: #dcfce7;
      color: #166534;
    }

    .badge-inativo {
      background: #fee2e2;
      color: #991b1b;
    }

    .btn-editar {
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: #f59e0b;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-editar:hover {
      background: #d97706;
    }

    .vazio {
      color: #64748b;
      font-size: 14px;
      margin-top: 10px;
    }

    footer {
      margin-top: 30px;
      color: #888;
      font-size: 12px;
      text-align: center;
    }

    footer strong {
      font-style: italic;
    }

    @media (max-width: 760px) {
      .app {
        flex-direction: column;
      }

      .sidebar {
        position: relative;
        width: 100%;
        height: auto;
      }

      .conteudo {
        margin-left: 0;
        width: 100%;
        padding: 16px;
      }

      .linha,
      .acoes-form {
        grid-template-columns: 1fr;
      }

      .btn-cancelar {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="app">

    <aside class="sidebar">
      <div class="logo">Comissões</div>
      <div class="subtitulo">Controle diário de produção</div>

      <div class="menu">
        <button id="btnColaborador" class="ativo" onclick="mostrarTela('colaborador')">
          👤 Cadastro de Colaborador
        </button>

        <button id="btnComissao" onclick="mostrarTela('comissao')">
          💰 Cadastro de Comissões
        </button>
      </div>
    </aside>

    <main class="conteudo">

      <div class="topo">
        <h1>Controle de Comissões Realizadas por Dia</h1>
        <p>Cadastre colaboradores, atualize status e registre as comissões realizadas diariamente.</p>
      </div>

      <section id="telaColaborador">

        <div class="card">
          <h2 id="tituloColaborador">Cadastro de Colaborador</h2>

          <div class="linha">
            <div>
              <label>Nome do Colaborador</label>
              <input type="text" id="nomeColaborador" placeholder="Digite o nome do colaborador">
            </div>

            <div>
              <label>E-mail</label>
              <input type="email" id="emailColaborador" placeholder="Digite o e-mail do colaborador">
            </div>
          </div>

          <label>Status</label>
          <div class="status-box">
            <button id="btnStatusAtivo" class="ativo" onclick="selecionarStatus('Ativo')" type="button">
              Ativo
            </button>

            <button id="btnStatusInativo" onclick="selecionarStatus('Inativo')" type="button">
              Inativo
            </button>
          </div>

          <div class="acoes-form">
            <button id="btnSalvarColaborador" class="btn-salvar" onclick="salvarColaborador()">
              Salvar Colaborador
            </button>

            <button id="btnCancelarColaborador" class="btn-cancelar" onclick="limparFormularioColaborador()">
              Cancelar
            </button>
          </div>

          <div id="msgColaborador" class="mensagem"></div>
        </div>

        <div class="card">
          <h2>Colaboradores Cadastrados</h2>
          <div id="listaColaboradores" class="tabela-area"></div>
        </div>

      </section>

      <section id="telaComissao" class="oculto">

        <div class="card">
          <h2 id="tituloComissao">Cadastro de Comissões</h2>

          <div class="linha">
            <div>
              <label>Data</label>
              <input type="date" id="dataComissao">
            </div>

            <div>
              <label>Colaborador</label>
              <select id="colaboradorComissao">
                <option value="">Selecione</option>
              </select>
            </div>
          </div>

          <div class="linha">
            <div>
              <label>Quantidade</label>
              <input type="number" id="quantidadeComissao" placeholder="Digite a quantidade">
            </div>

            <div>
              <label>Valor</label>
              <input type="number" id="valorComissao" step="0.01" placeholder="Digite o valor">
            </div>
          </div>

          <div class="acoes-form">
            <button id="btnSalvarComissao" class="btn-salvar" onclick="salvarComissao()">
              Salvar Comissão
            </button>

            <button id="btnCancelarComissao" class="btn-cancelar" onclick="limparFormularioComissao()">
              Cancelar
            </button>
          </div>

          <div id="msgComissao" class="mensagem"></div>
        </div>

        <div class="card">
          <h2>Comissões Cadastradas</h2>
          <div id="listaComissoes" class="tabela-area"></div>
        </div>

      </section>

      <footer>
        Desenvolvido por <strong>Roberto Lino</strong>
      </footer>

    </main>

  </div>

  <script>
    const URL_API = "https://script.google.com/macros/s/AKfycbwMPAiulfrqE8Ap8-a_s9C5POSUQGtb8NtrSYlvoZbaYGnV7dKEB0CVQnTh2Wqa3wJm/exec";

    let statusSelecionado = "Ativo";
    let idColaboradorEdicao = null;
    let idComissaoEdicao = null;

    let cacheColaboradores = [];
    let cacheComissoes = [];

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("dataComissao").valueAsDate = new Date();
      carregarTudo();
    });

    function carregarTudo() {
      carregarColaboradoresAtivos();
      carregarListaColaboradores();
      carregarListaComissoes();
    }

    function mostrarTela(tela) {
      document.getElementById("telaColaborador").classList.add("oculto");
      document.getElementById("telaComissao").classList.add("oculto");

      document.getElementById("btnColaborador").classList.remove("ativo");
      document.getElementById("btnComissao").classList.remove("ativo");

      if (tela === "colaborador") {
        document.getElementById("telaColaborador").classList.remove("oculto");
        document.getElementById("btnColaborador").classList.add("ativo");
        carregarListaColaboradores();
      }

      if (tela === "comissao") {
        document.getElementById("telaComissao").classList.remove("oculto");
        document.getElementById("btnComissao").classList.add("ativo");
        carregarColaboradoresAtivos();
        carregarListaComissoes();
      }
    }

    function selecionarStatus(status) {
      statusSelecionado = status;

      const btnAtivo = document.getElementById("btnStatusAtivo");
      const btnInativo = document.getElementById("btnStatusInativo");

      btnAtivo.className = "";
      btnInativo.className = "";

      if (status === "Ativo") {
        btnAtivo.classList.add("ativo");
      } else {
        btnInativo.classList.add("inativo");
      }
    }

    function mostrarMensagem(id, texto, tipo) {
      const msg = document.getElementById(id);
      msg.textContent = texto;
      msg.className = "mensagem " + tipo;

      setTimeout(() => {
        msg.className = "mensagem";
        msg.textContent = "";
      }, 3500);
    }

    async function getDados(acao) {
      const resposta = await fetch(URL_API + "?acao=" + acao);
      return await resposta.json();
    }

    async function enviarDados(dados) {
      await fetch(URL_API, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(dados)
      });
    }

    async function carregarColaboradoresAtivos() {
      const select = document.getElementById("colaboradorComissao");

      try {
        const colaboradores = await getDados("listarColaboradores");

        select.innerHTML = '<option value="">Selecione</option>';

        colaboradores.forEach(colaborador => {
          const option = document.createElement("option");
          option.value = colaborador.nome;
          option.textContent = colaborador.nome;
          select.appendChild(option);
        });

      } catch (erro) {
        console.error("Erro ao carregar colaboradores ativos:", erro);
      }
    }

    async function carregarListaColaboradores() {
      const area = document.getElementById("listaColaboradores");

      try {
        cacheColaboradores = await getDados("listarTodosColaboradores");

        if (!cacheColaboradores.length) {
          area.innerHTML = '<p class="vazio">Nenhum colaborador cadastrado ainda.</p>';
          return;
        }

        let html = `
          <table>
            <thead>
              <tr>
                <th>Colaborador</th>
                <th>E-mail</th>
                <th>Status</th>
                <th>Ação</th>
              </tr>
            </thead>
            <tbody>
        `;

        cacheColaboradores.forEach(item => {
          const statusClasse = item.status === "Ativo" ? "badge-ativo" : "badge-inativo";

          html += `
            <tr>
              <td>${item.nome || ""}</td>
              <td>${item.email || ""}</td>
              <td><span class="badge ${statusClasse}">${item.status || ""}</span></td>
              <td>
                <button class="btn-editar" onclick="editarColaborador('${item.id}')">Editar</button>
              </td>
            </tr>
          `;
        });

        html += `
            </tbody>
          </table>
        `;

        area.innerHTML = html;

      } catch (erro) {
        area.innerHTML = '<p class="vazio">Erro ao carregar colaboradores.</p>';
      }
    }

    async function carregarListaComissoes() {
      const area = document.getElementById("listaComissoes");

      try {
        cacheComissoes = await getDados("listarComissoes");

        if (!cacheComissoes.length) {
          area.innerHTML = '<p class="vazio">Nenhuma comissão cadastrada ainda.</p>';
          return;
        }

        let html = `
          <table>
            <thead>
              <tr>
                <th>Data</th>
                <th>Colaborador</th>
                <th>Quantidade</th>
                <th>Valor</th>
                <th>Ação</th>
              </tr>
            </thead>
            <tbody>
        `;

        cacheComissoes.forEach(item => {
          html += `
            <tr>
              <td>${formatarDataTela(item.data)}</td>
              <td>${item.colaborador || ""}</td>
              <td>${item.quantidade || ""}</td>
              <td>${formatarMoeda(item.valor)}</td>
              <td>
                <button class="btn-editar" onclick="editarComissao('${item.id}')">Editar</button>
              </td>
            </tr>
          `;
        });

        html += `
            </tbody>
          </table>
        `;

        area.innerHTML = html;

      } catch (erro) {
        area.innerHTML = '<p class="vazio">Erro ao carregar comissões.</p>';
      }
    }

    async function salvarColaborador() {
      const nome = document.getElementById("nomeColaborador").value.trim();
      const email = document.getElementById("emailColaborador").value.trim();

      if (!nome) {
        mostrarMensagem("msgColaborador", "Preencha o nome do colaborador.", "erro");
        return;
      }

      if (!email) {
        mostrarMensagem("msgColaborador", "Preencha o e-mail do colaborador.", "erro");
        return;
      }

      const acao = idColaboradorEdicao ? "atualizarColaborador" : "salvarColaborador";

      try {
        await enviarDados({
          acao: acao,
          id: idColaboradorEdicao,
          nome: nome,
          email: email,
          status: statusSelecionado
        });

        limparFormularioColaborador();
        mostrarMensagem("msgColaborador", idColaboradorEdicao ? "Colaborador atualizado com sucesso." : "Colaborador salvo com sucesso.", "sucesso");

        setTimeout(() => {
          carregarColaboradoresAtivos();
          carregarListaColaboradores();
        }, 800);

      } catch (erro) {
        mostrarMensagem("msgColaborador", "Erro ao salvar colaborador.", "erro");
      }
    }

    function editarColaborador(id) {
      const item = cacheColaboradores.find(c => String(c.id) === String(id));

      if (!item) return;

      idColaboradorEdicao = item.id;

      document.getElementById("nomeColaborador").value = item.nome || "";
      document.getElementById("emailColaborador").value = item.email || "";
      selecionarStatus(item.status || "Ativo");

      document.getElementById("tituloColaborador").textContent = "Editar Colaborador";
      document.getElementById("btnSalvarColaborador").textContent = "Atualizar Colaborador";
      document.getElementById("btnCancelarColaborador").style.display = "block";

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function limparFormularioColaborador() {
      idColaboradorEdicao = null;

      document.getElementById("nomeColaborador").value = "";
      document.getElementById("emailColaborador").value = "";
      selecionarStatus("Ativo");

      document.getElementById("tituloColaborador").textContent = "Cadastro de Colaborador";
      document.getElementById("btnSalvarColaborador").textContent = "Salvar Colaborador";
      document.getElementById("btnCancelarColaborador").style.display = "none";
    }

    async function salvarComissao() {
      const data = document.getElementById("dataComissao").value;
      const colaborador = document.getElementById("colaboradorComissao").value;
      const quantidade = document.getElementById("quantidadeComissao").value;
      const valor = document.getElementById("valorComissao").value;

      if (!data || !colaborador || !quantidade || !valor) {
        mostrarMensagem("msgComissao", "Preencha todos os campos.", "erro");
        return;
      }

      const acao = idComissaoEdicao ? "atualizarComissao" : "salvarComissao";

      try {
        await enviarDados({
          acao: acao,
          id: idComissaoEdicao,
          data: data,
          colaborador: colaborador,
          quantidade: quantidade,
          valor: valor
        });

        limparFormularioComissao();
        mostrarMensagem("msgComissao", idComissaoEdicao ? "Comissão atualizada com sucesso." : "Comissão salva com sucesso.", "sucesso");

        setTimeout(carregarListaComissoes, 800);

      } catch (erro) {
        mostrarMensagem("msgComissao", "Erro ao salvar comissão.", "erro");
      }
    }

    function editarComissao(id) {
      const item = cacheComissoes.find(c => String(c.id) === String(id));

      if (!item) return;

      idComissaoEdicao = item.id;

      document.getElementById("dataComissao").value = item.data || "";
      document.getElementById("colaboradorComissao").value = item.colaborador || "";
      document.getElementById("quantidadeComissao").value = item.quantidade || "";
      document.getElementById("valorComissao").value = item.valor || "";

      document.getElementById("tituloComissao").textContent = "Editar Comissão";
      document.getElementById("btnSalvarComissao").textContent = "Atualizar Comissão";
      document.getElementById("btnCancelarComissao").style.display = "block";

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function limparFormularioComissao() {
      idComissaoEdicao = null;

      document.getElementById("dataComissao").valueAsDate = new Date();
      document.getElementById("colaboradorComissao").value = "";
      document.getElementById("quantidadeComissao").value = "";
      document.getElementById("valorComissao").value = "";

      document.getElementById("tituloComissao").textContent = "Cadastro de Comissões";
      document.getElementById("btnSalvarComissao").textContent = "Salvar Comissão";
      document.getElementById("btnCancelarComissao").style.display = "none";
    }

    function formatarMoeda(valor) {
      const numero = Number(String(valor).replace(",", "."));

      if (isNaN(numero)) return valor || "";

      return numero.toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
      });
    }

    function formatarDataTela(data) {
      if (!data) return "";

      const partes = String(data).split("-");

      if (partes.length === 3) {
        return partes[2] + "/" + partes[1] + "/" + partes[0];
      }

      return data;
    }
  </script>

</body>
</html>
